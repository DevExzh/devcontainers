name: Build and Push Private Docker Images

on:
  push:
    branches: [main, master]
    paths:
      - "claude-dev/**"
      - "texlive-pdf/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "claude-dev/**"
      - "texlive-pdf/**"
  schedule:
    # 每天 UTC 00:00 检查工具链新版本 / 拉取最新基础镜像
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild all images"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      claude-dev: ${{ steps.check.outputs.claude-dev }}
      texlive-pdf: ${{ steps.check.outputs.texlive-pdf }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED=$(git log --name-only --pretty=format: "$AFTER" || echo "")
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" || echo "")
            fi
          elif [ "$EVENT" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" || echo "")
          else
            CHANGED=""
          fi

          if echo "$CHANGED" | grep -q "^claude-dev/" || echo "$CHANGED" | grep -q "^.github/workflows/docker-build.yml"; then
            echo "claude-dev=true" >> $GITHUB_OUTPUT
          else
            echo "claude-dev=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^texlive-pdf/" || echo "$CHANGED" | grep -q "^.github/workflows/docker-build.yml"; then
            echo "texlive-pdf=true" >> $GITHUB_OUTPUT
          else
            echo "texlive-pdf=false" >> $GITHUB_OUTPUT
          fi

  check-claude-dev:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.versions.outputs.go }}
      rust_version: ${{ steps.versions.outputs.rust }}
      claude_version: ${{ steps.versions.outputs.claude }}
      should_build: ${{ steps.decide.outputs.should_build }}
    env:
      TOOL_VERSIONS_FILE: claude-dev/.tool-versions
      FOLDER: claude-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read current tool versions
        id: current
        run: |
          if [ -f "${{ env.TOOL_VERSIONS_FILE }}" ]; then
            echo "go=$(grep '^go ' ${{ env.TOOL_VERSIONS_FILE }} | awk '{print $2}' || echo 'none')" >> $GITHUB_OUTPUT
            echo "rust=$(grep '^rust ' ${{ env.TOOL_VERSIONS_FILE }} | awk '{print $2}' || echo 'none')" >> $GITHUB_OUTPUT
            echo "claude=$(grep '^claude-code ' ${{ env.TOOL_VERSIONS_FILE }} | awk '{print $2}' || echo 'none')" >> $GITHUB_OUTPUT
          else
            echo "go=none" >> $GITHUB_OUTPUT
            echo "rust=none" >> $GITHUB_OUTPUT
            echo "claude=none" >> $GITHUB_OUTPUT
          fi

      - name: Fetch latest tool versions
        id: versions
        run: |
          # 获取 Go 最新版本 (官方 JSON API)
          GO_LATEST=$(curl -s 'https://go.dev/VERSION?m=text' | head -n1 | sed 's/^go//')
          echo "go=$GO_LATEST" >> $GITHUB_OUTPUT
          echo "Latest Go: $GO_LATEST"

          # 获取 Rust 最新 stable 版本 (GitHub API)
          RUST_LATEST=$(curl -sL https://api.github.com/repos/rust-lang/rust/releases/latest | jq -r '.tag_name' | sed 's/^rust-//')
          echo "rust=$RUST_LATEST" >> $GITHUB_OUTPUT
          echo "Latest Rust: $RUST_LATEST"

          # 获取 @anthropic-ai/claude-code 最新版本 (npm registry)
          CLAUDE_LATEST=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "0.0.0")
          echo "claude=$CLAUDE_LATEST" >> $GITHUB_OUTPUT
          echo "Latest Claude Code: $CLAUDE_LATEST"

      - name: Determine if build is needed
        id: decide
        run: |
          FORCE="${{ github.event.inputs.force_rebuild || 'false' }}"
          EVENT="${{ github.event_name }}"
          FILES_CHANGED="${{ needs.detect-changes.outputs.claude-dev }}"

          CURRENT_GO="${{ steps.current.outputs.go }}"
          CURRENT_RUST="${{ steps.current.outputs.rust }}"
          CURRENT_CLAUDE="${{ steps.current.outputs.claude }}"

          LATEST_GO="${{ steps.versions.outputs.go }}"
          LATEST_RUST="${{ steps.versions.outputs.rust }}"
          LATEST_CLAUDE="${{ steps.versions.outputs.claude }}"

          echo "Current: Go=$CURRENT_GO, Rust=$CURRENT_RUST, Claude=$CURRENT_CLAUDE"
          echo "Latest:  Go=$LATEST_GO, Rust=$LATEST_RUST, Claude=$LATEST_CLAUDE"
          echo "Files changed: $FILES_CHANGED"

          if [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Reason: Force rebuild"
          elif [ "$EVENT" = "push" ] || [ "$EVENT" = "pull_request" ]; then
            if [ "$FILES_CHANGED" = "true" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Reason: Files changed"
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "Reason: No relevant file changes"
            fi
          elif [ "$CURRENT_GO" != "$LATEST_GO" ] || [ "$CURRENT_RUST" != "$LATEST_RUST" ] || [ "$CURRENT_CLAUDE" != "$LATEST_CLAUDE" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Reason: Tool version updated"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Reason: No changes detected"
          fi

      - name: Update version tracking file
        if: steps.decide.outputs.should_build == 'true'
        run: |
          echo "go ${{ steps.versions.outputs.go }}" > ${{ env.TOOL_VERSIONS_FILE }}
          echo "rust ${{ steps.versions.outputs.rust }}" >> ${{ env.TOOL_VERSIONS_FILE }}
          echo "claude-code ${{ steps.versions.outputs.claude }}" >> ${{ env.TOOL_VERSIONS_FILE }}
          cat ${{ env.TOOL_VERSIONS_FILE }}

      - name: Commit version updates (for scheduled builds)
        if: steps.decide.outputs.should_build == 'true' && github.event_name == 'schedule'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.TOOL_VERSIONS_FILE }}
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump tool versions

          - Go: ${{ steps.versions.outputs.go }}
          - Rust: ${{ steps.versions.outputs.rust }}
          - Claude Code: ${{ steps.versions.outputs.claude }}"
            git push
          fi

  build-claude-dev:
    needs: [detect-changes, check-claude-dev]
    if: needs.check-claude-dev.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_NAME: claude-dev
      # 当 4 项 secrets 全部配置时启用对应云仓库推送
      ALIYUN_ENABLED: ${{ secrets.ALIYUN_REGISTRY != '' && secrets.ALIYUN_NAMESPACE != '' && secrets.ALIYUN_USERNAME != '' && secrets.ALIYUN_PASSWORD != '' }}
      TENCENT_ENABLED: ${{ secrets.TENCENT_REGISTRY != '' && secrets.TENCENT_NAMESPACE != '' && secrets.TENCENT_USERNAME != '' && secrets.TENCENT_PASSWORD != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        if: env.ALIYUN_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Log in to Tencent Cloud Container Registry
        if: env.TENCENT_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            name=${{ secrets.ALIYUN_REGISTRY || 'aliyun.disabled.invalid' }}/${{ secrets.ALIYUN_NAMESPACE || 'na' }}/${{ env.IMAGE_NAME }},enable=${{ env.ALIYUN_ENABLED }}
            name=${{ secrets.TENCENT_REGISTRY || 'tencent.disabled.invalid' }}/${{ secrets.TENCENT_NAMESPACE || 'na' }}/${{ env.IMAGE_NAME }},enable=${{ env.TENCENT_ENABLED }}
          tags: |
            type=raw,value=latest
            type=raw,value=go${{ needs.check-claude-dev.outputs.go_version }}-rust${{ needs.check-claude-dev.outputs.rust_version }}
            type=raw,value=claude${{ needs.check-claude-dev.outputs.claude_version }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./claude-dev
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ needs.check-claude-dev.outputs.go_version }}
            RUST_VERSION=${{ needs.check-claude-dev.outputs.rust_version }}
            CLAUDE_CODE_VERSION=${{ needs.check-claude-dev.outputs.claude_version }}

  check-texlive-pdf:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    env:
      FOLDER: texlive-pdf
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine if build is needed
        id: decide
        run: |
          FORCE="${{ github.event.inputs.force_rebuild || 'false' }}"
          EVENT="${{ github.event_name }}"
          FILES_CHANGED="${{ needs.detect-changes.outputs.texlive-pdf }}"

          echo "Event: $EVENT"
          echo "Files changed: $FILES_CHANGED"

          if [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Reason: Force rebuild"
          elif [ "$EVENT" = "push" ] || [ "$EVENT" = "pull_request" ]; then
            if [ "$FILES_CHANGED" = "true" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Reason: Files changed"
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "Reason: No relevant file changes"
            fi
          else
            # Schedule or workflow_dispatch: always build to pick up the latest base image
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Reason: Scheduled/dispatched build"
          fi

  build-texlive-pdf:
    needs: [detect-changes, check-texlive-pdf]
    if: needs.check-texlive-pdf.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_NAME: texlive-pdf
      # 当 4 项 secrets 全部配置时启用对应云仓库推送
      ALIYUN_ENABLED: ${{ secrets.ALIYUN_REGISTRY != '' && secrets.ALIYUN_NAMESPACE != '' && secrets.ALIYUN_USERNAME != '' && secrets.ALIYUN_PASSWORD != '' }}
      TENCENT_ENABLED: ${{ secrets.TENCENT_REGISTRY != '' && secrets.TENCENT_NAMESPACE != '' && secrets.TENCENT_USERNAME != '' && secrets.TENCENT_PASSWORD != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        if: env.ALIYUN_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Log in to Tencent Cloud Container Registry
        if: env.TENCENT_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            name=${{ secrets.ALIYUN_REGISTRY || 'aliyun.disabled.invalid' }}/${{ secrets.ALIYUN_NAMESPACE || 'na' }}/${{ env.IMAGE_NAME }},enable=${{ env.ALIYUN_ENABLED }}
            name=${{ secrets.TENCENT_REGISTRY || 'tencent.disabled.invalid' }}/${{ secrets.TENCENT_NAMESPACE || 'na' }}/${{ env.IMAGE_NAME }},enable=${{ env.TENCENT_ENABLED }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./texlive-pdf
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
